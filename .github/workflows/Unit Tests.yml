name: Unit Tests
on: [push, pull_request]

jobs:
  quality-test:
    # The type of runner that the job will run on
    runs-on: windows-latest

    permissions: write-all

    # Only when run from the main repo
    if: github.repository == 'Microsoft365DSC/Microsoft365DSC'

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Modules
        shell: pwsh
        run: |
          Install-PSResource -Name ReverseDSC -Scope AllUsers -TrustRepository
          Install-PSResource -Name DSCParser -Scope AllUsers -TrustRepository
          Install-PSResource -Name PSDesiredStateConfiguration -Scope AllUsers -TrustRepository
          Install-PSResource -Name Pester -Scope AllUsers -TrustRepository
          [System.Environment]::SetEnvironmentVariable('M365DSCTelemetryEnabled', $false, [System.EnvironmentVariableTarget]::Machine);

      - name: Build Dll Files
        shell: pwsh
        run: |
          & ./Utilities/Build-DllFiles.ps1 -Configuration Release

      - name: Run Quality Checks
        shell: pwsh
        run: |
          Import-Module './Tests/TestHarness.psm1' -Force;
          $MaximumFunctionCount = 32767

          try
          {
              $results = Invoke-QualityChecksHarness
          }
          catch
          {
              $MaximumFunctionCount = 32767
              Import-Module './Tests/TestHarness.psm1' -Force;
              $results = Invoke-QualityChecksHarness
          }
          if ($results.FailedCount -gt 0)
          {
              throw "{$($results.FailedCount)} Quality Check(s) Failed"
          }

  unit-test:
    # The type of runner that the job will run on
    runs-on: windows-latest

    permissions: write-all

    # Only when run from the main repo
    if: github.repository == 'Microsoft365DSC/Microsoft365DSC'

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Modules
        shell: pwsh
        run: |
          Install-PSResource -Name ReverseDSC -Scope AllUsers -TrustRepository
          Install-PSResource -Name DSCParser -Scope AllUsers -TrustRepository
          Install-PSResource -Name PSDesiredStateConfiguration -Scope AllUsers -TrustRepository
          Install-PSResource -Name Pester -Scope AllUsers -TrustRepository
          [System.Environment]::SetEnvironmentVariable('M365DSCTelemetryEnabled', $false, [System.EnvironmentVariableTarget]::Machine);

      - name: Build Dll Files
        shell: pwsh
        run: |
          & ./Utilities/Build-DllFiles.ps1 -Configuration Release

      - name: Move Module Files to temp directory
        shell: pwsh
        run: |
          $manifest = Test-ModuleManifest -Path './Modules/Microsoft365DSC/Microsoft365DSC.psd1'
          $version = $manifest.Version
          $stagingPath = "$env:TEMP\Staging"
          if (-not (Test-Path -Path $stagingPath))
          {
              New-Item -Path $stagingPath -ItemType Directory -Force
          }
          $modulePath = "$stagingPath\Microsoft365DSC"
          if (-not (Test-Path -Path $modulePath))
          {
              New-Item -Path $modulePath -ItemType Directory -Force
          }
          $modulePath = "$modulePath\$version"
          if (Test-Path -Path $modulePath)
          {
              Remove-Item -Path $modulePath -Recurse -Force
          }
          New-Item -Path $modulePath -ItemType Directory -Force
          Copy-Item -Path './Modules/Microsoft365DSC/*' -Destination $modulePath -Recurse -Force

      - name: Run Test Harness
        shell: pwsh
        run: |
          Import-Module './Tests/TestHarness.psm1' -Force;
          $MaximumFunctionCount = 32767

          try
          {
              $results = Invoke-TestHarness -ModuleDirectory "$env:TEMP\Staging"
          }
          catch
          {
              $MaximumFunctionCount = 32767
              Import-Module './Tests/TestHarness.psm1' -Force;
              $results = Invoke-TestHarness -ModuleDirectory "$env:TEMP\Staging"
          }
          if ($results.FailedCount -gt 0)
          {
              throw "{$($results.FailedCount)} Unit Test(s) Failed"
          }

      - name: Upload Code Coverage as Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Code Coverage Report
          path: coverage.xml
